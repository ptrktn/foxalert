{% extends "base.html" %}

{% block content %}
<div class="card">
  <h2>Login</h2>
  <div style="display:flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;">
    {% if xcfg.password_login_enabled and xcfg.passkey_login_enabled %}
    <button type="button" onclick="showMode('password')" style="flex:1;">Password</button>
    <button type="button" onclick="showMode('passkey')" style="flex:1;">Passkey</button>
    {% endif %}
  </div>

  <div id="password-panel">
    <form method="POST" action="{{ url_for('login') }}">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Sign in</button>
    </form>
    <p class="muted">Use <strong>user1</strong> / <strong>password123</strong> for demo login.</p>
  </div>

  <div id="passkey-panel" style="display:none; margin-top: 12px;">
    <input id="passkey-username" type="text" placeholder="Username" required>
    <button type="button" onclick="registerPasskey()">Register Passkey</button>
    <button type="button" onclick="loginWithPasskey()">Login with Passkey</button>
    <p id="status" class="muted"></p>
    <p class="muted">Passkey login uses browser-supported WebAuthn and requires a compatible device/browser.</p>
  </div>
</div>

<script>
  const status = document.getElementById("status");

  function showMode(mode) {
    document.getElementById('password-panel').style.display = mode === 'password' ? 'block' : 'none';
    document.getElementById('passkey-panel').style.display = mode === 'passkey' ? 'block' : 'none';
    status.textContent = '';
  }

  const b64url = {
    encode: buf => btoa(String.fromCharCode(...new Uint8Array(buf)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, ''),
    decode: str => Uint8Array.from(
      atob(str.replace(/-/g, '+').replace(/_/g, '/')),
      c => c.charCodeAt(0)
    ).buffer
  };

  function prepareOptions(options) {
    options.challenge = b64url.decode(options.challenge);
    options.user && (options.user.id = b64url.decode(options.user.id));
    (options.excludeCredentials || []).forEach(c => c.id = b64url.decode(c.id));
    (options.allowCredentials || []).forEach(c => c.id = b64url.decode(c.id));
    return options;
  }

  function credentialToJSON(cred) {
    const resp = cred.response;
    return {
      id: cred.id,
      rawId: b64url.encode(cred.rawId),
      type: cred.type,
      response: {
        clientDataJSON: b64url.encode(resp.clientDataJSON),
        attestationObject: resp.attestationObject
          ? b64url.encode(resp.attestationObject) : undefined,
        authenticatorData: resp.authenticatorData
          ? b64url.encode(resp.authenticatorData) : undefined,
        signature: resp.signature
          ? b64url.encode(resp.signature) : undefined,
        userHandle: resp.userHandle
          ? b64url.encode(resp.userHandle) : undefined,
      }
    };
  }

  async function registerPasskey() {
    const username = document.getElementById("passkey-username").value;
    if (!navigator.credentials || !navigator.credentials.create) {
      status.textContent = "❌ Passkeys not supported by this browser or insecure context.";
      return;
    }

    try {
      const optRes = await fetch("/register/begin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });
      if (!optRes.ok) throw new Error('server error: ' + optRes.status);
      const options = prepareOptions(await optRes.json());

      const credential = await navigator.credentials.create({ publicKey: options });
      if (!credential) throw new Error('no credential created');

      const verRes = await fetch("/register/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(credentialToJSON(credential))
      });
      const result = await verRes.json();
      status.textContent = result.status === "ok"
        ? "✅ Passkey registered!" : "❌ " + (result.error || 'unknown error');
    } catch (err) {
      status.textContent = "❌ " + (err.message || err);
    }
  }

  async function loginWithPasskey() {
    const username = document.getElementById("passkey-username").value;
    if (!navigator.credentials || !navigator.credentials.get) {
      status.textContent = "❌ Passkeys not supported by this browser or insecure context.";
      return;
    }

    try {
      const optRes = await fetch("/login/begin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });
      if (!optRes.ok) throw new Error('server error: ' + optRes.status);
      const options = prepareOptions(await optRes.json());

      const assertion = await navigator.credentials.get({ publicKey: options });
      if (!assertion) throw new Error('no assertion returned');

      const verRes = await fetch("/login/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(credentialToJSON(assertion))
      });
      const result = await verRes.json();
      if (result.status === "ok") window.location.href = "/";
      else status.textContent = "❌ " + (result.error || 'authentication failed');
    } catch (err) {
      status.textContent = "❌ " + (err.message || err);
    }
  }

  // Auto-select mode when only one login method is enabled
  window.addEventListener('DOMContentLoaded', () => {
    {% if xcfg.password_login_enabled and not xcfg.passkey_login_enabled %}
    showMode('password');
    {% elif xcfg.passkey_login_enabled and not xcfg.password_login_enabled %}
    showMode('passkey');
    {% endif %}
  });
</script>
{% endblock %}
