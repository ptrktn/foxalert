<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="Secure authentication with password and passkey login">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232563eb' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='system-ui'>F</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232563eb' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='system-ui'>F</text></svg>">
  <title>Flask MFA Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; max-width: 640px; margin: 48px auto; padding: 20px; color: #222; }
    .card { border: 1px solid #e6e6e6; padding: 28px; border-radius: 10px; box-shadow: 0 6px 18px rgba(16,24,40,0.04); }
    input, button { width: 100%; padding: 12px 14px; margin: 10px 0; box-sizing: border-box; border-radius: 6px; border: 1px solid #d1d5db; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; font-weight: 600; }
    button.secondary { background: #ef4444; }
    .muted { color: #6b7280; font-size: 0.95rem; }
    .flash { padding: 10px; background: #fffbeb; color: #92400e; border: 1px solid #fef3c7; margin-bottom: 14px; border-radius: 6px; }
    .center { text-align: center; }
    a.button-link { text-decoration: none; display: inline-block; width:100%; }
    code { background:#f3f4f6; padding:2px 6px; border-radius:4px; font-family: monospace; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <!-- PWA Install Prompt -->
  <script src="{{ url_for('static', filename='pwa-install.js') }}"></script>

  <!-- Notifications client (SSE) -->
  <script src="{{ url_for('static', filename='notifications.js') }}"></script>

  <!-- Enable notifications button (visible until user enables) -->
  {% if current_user %}
  <button id="notify-enable-btn" style="position:fixed; right:20px; bottom:20px; z-index:10002; display:none; padding:10px 14px; border-radius:8px; background:#111; color:white; border:none;">Enable notifications</button>
  {% endif %}

  <script>
    // Register service worker for PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
          .then(reg => {
            console.log('Service Worker registered successfully:', reg);
            console.log('Service Worker active scope:', reg.scope);
            // Check for updates periodically
            setInterval(() => {
              reg.update();
            }, 60000); // Check every 60 seconds
          })
          .catch(err => {
            console.log('Service Worker registration failed:', err);
          });
      });

      // Handle SW updates
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
